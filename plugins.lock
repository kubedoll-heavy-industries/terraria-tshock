# plugins.lock — every artifact baked into the image and its content hash.
#
# This file is the human-readable mirror of the ARG values in Dockerfile. CI
# verifies these hashes at build time; mismatch = build fails. Update both this
# file and the matching ARG default in Dockerfile when bumping a pin.
#
# Format: YAML. Field meanings:
#   sha256 — SHA-256 of the file as fetched.
#   source — exact commit-pinned URL the build will fetch.

base_images:
  fetcher:
    image: docker.io/library/debian
    tag: 12-slim
    digest: sha256:67b30a61dc87758f0caf819646104f29ecbda97d920aaf5edc834128ac8493d3
  plugin_builder:
    image: mcr.microsoft.com/dotnet/sdk
    tag: "9.0"
    digest: sha256:087fc98e5c6ffcea6c3e276c135c4a6717c589d9509a09cc22e7c634830a4db8
    notes: |
      .NET 9 SDK (not 10). TShock 6.1's transitive dep graph references net6.0
      (via TerrariaServerAPI etc.); the .NET 10 SDK dropped the net6 targeting
      pack, so restoring against TShock 6.1 NuGet fails on net10 SDK with
      "[MSBuild]::GetTargetFrameworkVersion(net6.0) cannot be evaluated". The
      .NET 9 SDK still ships net6/net7/net8/net9 packs and produces net9.0
      plugin DLLs that load on the .NET 10 runtime via roll-forward.
  runtime:
    image: mcr.microsoft.com/dotnet/runtime
    tag: 10.0-resolute-chiseled
    digest: sha256:e47cc1e32cd37647d0505f9a3192a5cf1894e1fc70df0e7bcb133ce2fec5ea7f
    notes: |
      .NET 10 LTS runtime on Ubuntu 26.04 LTS (Resolute) chiseled (distroless).
      No shell, no package manager, no apt. Newest available LTS base — 26.04
      shipped April 2026 and Microsoft published the chiseled variant promptly.
      TShock 6.1.0 is a native net9.0 apphost; we coerce onto the .NET 10
      framework via DOTNET_ROLL_FORWARD=LatestMajor.
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=true is inherited from the base —
      chiseled ships without ICU; TShock's i18n uses .mo files that don't
      need .NET's globalization stack, so this is fine.

tshock:
  version: 6.1.0
  terraria_version: 1.4.5.6
  channel: stable
  notes: |
    First .NET 9-native TShock for Terraria 1.4.5.6, released 2026-03-11. Bumps
    out of TShock 5.x (which targeted .NET 6 EOL + had vulnerable transitive
    deps Trivy flagged). 6.x changes the plugin ABI — see plugins section
    below for the sourcing change.
  asset: TShock-6.1.0-for-Terraria-1.4.5.6-linux-x64-Release.zip
  source: https://github.com/Pryaxis/TShock/releases/download/v6.1.0/TShock-6.1.0-for-Terraria-1.4.5.6-linux-x64-Release.zip
  sha256: c4a63624e49422e46967c4cb6a72b698acb96dcc645e5b1daaa0f00e2cb98db9
  size: 34002037

tini:
  version: v0.19.0
  notes: |
    Static glibc-linked PID 1 for clean SIGTERM → graceful TShock shutdown
    (saves world before exit). Single static binary, no runtime deps; copied
    into the chiseled image at /usr/local/bin/tini.
  source: https://github.com/krallin/tini/releases/download/v0.19.0/tini-static-amd64
  sha256: c5b0666b4cb676901f90dfcb37106783c5fe2077b04590973b885950611b30ee
  size: 870496

plugins:
  source_repo: UnrealMultiple/TShockPlugin
  source_commit: 221ff312bc357512af35fdafd5afdf130cf46951
  source_date: 2026-05-11
  license: GPL-3.0
  build_target: TShock 6.1.0 NuGet (pinned in template.targets), net9.0
  notes: |
    Plugins are built from source in a multi-stage builder against the TShock
    6.1.0 NuGet package — we do NOT consume UnrealMultiple's prebuilt Release
    zip (last published 2024-04, predates TShock 6).

    Sourcing change vs the 5.x image: RenderBr/tShock-v5-plugins is explicitly
    v5-only and has no v6 sibling. UnrealMultiple/TShockPlugin is the active
    v6 plugin collection (134 plugins, GPL-3.0, GitHub master updated weekly).
  baked:
    - name: History
      install_as: ServerPlugins/History.dll
      source: https://github.com/UnrealMultiple/TShockPlugin/tree/221ff312bc357512af35fdafd5afdf130cf46951/src/History
      replaces: RenderBr/tShock-v5-plugins/History.dll (v5 image only)
    - name: HouseRegion
      install_as: ServerPlugins/HouseRegion.dll
      source: https://github.com/UnrealMultiple/TShockPlugin/tree/221ff312bc357512af35fdafd5afdf130cf46951/src/HouseRegion
      replaces: RenderBr/tShock-v5-plugins/House Regions.dll (v5 image only)
    - name: RegionView
      install_as: ServerPlugins/RegionView.dll
      source: https://github.com/UnrealMultiple/TShockPlugin/tree/221ff312bc357512af35fdafd5afdf130cf46951/src/RegionView
      replaces: RenderBr/tShock-v5-plugins/RegionView.dll (v5 image only)
  intentionally_absent:
    - name: AntiSpam
      reason: |
        UnrealMultiple's 134-plugin collection has no chat-rate-limit
        equivalent for TShock 6.x. Day-one image ships without anti-spam;
        sourcing a v6-compatible replacement is a tracked follow-up.

runtime_layout:
  /opt/tshock/TShock.Server: entrypoint (ELF apphost, net9.0 → rolled forward to .NET 10)
  /opt/tshock/ServerPlugins/: baked plugin DLLs (read-only)
  /opt/tshock/bin/: TShock + Terraria managed assemblies (read-only)
  /opt/tshock/i18n/: TShock translations (read-only)
  /opt/tshock/GeoIP.dat: GeoIP database shipped with TShock (read-only)
  /serverdata/serverfiles/worlds/: chart-mounted PVC (writable, uid 1000 via fsGroup)
  /serverdata/serverfiles/tshock/: chart-mounted PVC (writable; holds config.json + sqlite)
  /serverdata/serverfiles/logs/: chart-mounted PVC (writable)
  /usr/local/bin/tini: PID 1 reaper (static binary)
