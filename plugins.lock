# plugins.lock — every artifact baked into the image and its content hash.
#
# This file is the human-readable mirror of the ARG values in Dockerfile. CI
# verifies these hashes at build time; mismatch = build fails. Update both this
# file and the matching ARG default in Dockerfile when bumping a pin.
#
# Format: YAML. Field meanings:
#   sha256 — SHA-256 of the file as fetched.
#   source — exact commit-pinned URL the build will fetch.

base_images:
  fetcher:
    image: docker.io/library/debian
    tag: 12-slim
    digest: sha256:67b30a61dc87758f0caf819646104f29ecbda97d920aaf5edc834128ac8493d3
  # (plugin_builder removed — day-1 image ships with no baked plugins. See
  # `plugins:` section below for the sourcing analysis.)
  runtime:
    image: mcr.microsoft.com/dotnet/runtime
    tag: "10.0-resolute"
    digest: sha256:20b918a3f49c838e57179475a16df93353c2f282be801e0135b699846bccc605
    notes: |
      .NET 10 LTS runtime on Ubuntu 26.04 LTS (Resolute) — non-chiseled. Full
      apt-based userspace with bash, coreutils, libc, ICU/tzdata. Earlier
      iterations tried the -chiseled and -chiseled-extra variants for a
      distroless property, but OTAPI/Terraria's globalization stack has
      assumptions about userspace that we cannot satisfy without forking
      OTAPI. Hardening is restored at the K8s podSpec level (see OPS.md):
      runAsNonRoot, readOnlyRootFilesystem with /tmp tmpfs, drop ALL caps,
      seccompProfile=RuntimeDefault, NetworkPolicy egress restriction.

      TShock 6.1.0 is a native net9.0 apphost; we coerce onto the .NET 10
      framework via DOTNET_ROLL_FORWARD=LatestMajor.
      DOTNET_BUNDLE_EXTRACT_BASE_DIR=/tmp redirects TShock's single-file
      apphost extract dir from / (which is read-only when the chart sets
      readOnlyRootFilesystem=true; /tmp is a tmpfs emptyDir mounted by the
      chart for this purpose).

tshock:
  version: 6.1.0
  terraria_version: 1.4.5.6
  channel: stable
  notes: |
    First .NET 9-native TShock for Terraria 1.4.5.6, released 2026-03-11. Bumps
    out of TShock 5.x (which targeted .NET 6 EOL + had vulnerable transitive
    deps Trivy flagged). 6.x changes the plugin ABI — see plugins section
    below for the sourcing change.
  asset: TShock-6.1.0-for-Terraria-1.4.5.6-linux-x64-Release.zip
  source: https://github.com/Pryaxis/TShock/releases/download/v6.1.0/TShock-6.1.0-for-Terraria-1.4.5.6-linux-x64-Release.zip
  sha256: c4a63624e49422e46967c4cb6a72b698acb96dcc645e5b1daaa0f00e2cb98db9
  size: 34002037

tini:
  version: v0.19.0
  notes: |
    Static glibc-linked PID 1 for clean SIGTERM → graceful TShock shutdown
    (saves world before exit). Single static binary, no runtime deps; copied
    into the chiseled image at /usr/local/bin/tini.
  source: https://github.com/krallin/tini/releases/download/v0.19.0/tini-static-amd64
  sha256: c5b0666b4cb676901f90dfcb37106783c5fe2077b04590973b885950611b30ee
  size: 870496

plugins:
  baked: []
  notes: |
    DAY-1 SHIPS WITH NO BAKED PLUGINS. The chart's plugin volume can be used
    to mount custom plugins at runtime; the image's /opt/tshock/ServerPlugins/
    contains only TShockAPI.dll from the upstream TShock 6.1.0 zip.

    The original plan was to bake v6-compatible History/HouseRegion/RegionView
    built from source against UnrealMultiple/TShockPlugin (the active v6
    plugin collection, GPL-3.0, master updated weekly). That sourcing path
    is blocked on a Roslyn version coupling:

    - UnrealMultiple's build uses a Roslyn source generator (`SourceGen`,
      OutputItemType=Analyzer) that depends on Microsoft.CodeAnalysis.CSharp 5.3.0
    - Roslyn 5.x ships only with the .NET 10 SDK
    - The .NET 10 SDK drops the net6.0 targeting pack that TShock 6.1's
      transitive NuGet graph (TerrariaServerAPI etc.) still references
    - No single Microsoft-published SDK can both restore TShock 6.1 AND
      successfully load this source generator. Workarounds (reverse-engineering
      their publish-plugins-zip.ps1 build script, or building the entire
      134-project solution) are out of scope for the first 6.1 image cut.

    RenderBr/tShock-v5-plugins (source of the 5.x image's baked plugins) is
    hard-locked to TShock 5.x by ABI — not viable here.

    Follow-up paths for re-baking plugins later:
    1. Reverse-engineer UnrealMultiple's publish-plugins-zip.ps1 and embed
       the same MSBuild incantation in our multi-stage builder.
    2. Pull prebuilt DLLs from UnrealMultiple CI artifacts (currently not
       retained past 90 days but they could be opted in).
    3. magaflaca/LegacyPluginLoader v6-loads-v5 shim + RenderBr v5 DLLs
       (highest convenience, highest abandonment risk — single-author shim).

runtime_layout:
  /opt/tshock/TShock.Server: entrypoint (ELF apphost, net9.0 → rolled forward to .NET 10)
  /opt/tshock/ServerPlugins/: TShockAPI.dll only (no baked plugins on day-1; chart's plugin volume can overlay)
  /opt/tshock/bin/: TShock + Terraria managed assemblies (read-only)
  /opt/tshock/i18n/: TShock translations (read-only)
  /opt/tshock/GeoIP.dat: GeoIP database shipped with TShock (read-only)
  /serverdata/serverfiles/worlds/: chart-mounted PVC (writable, uid 1000 via fsGroup)
  /serverdata/serverfiles/tshock/: chart-mounted PVC (writable; holds config.json + sqlite)
  /serverdata/serverfiles/logs/: chart-mounted PVC (writable)
  /usr/local/bin/tini: PID 1 reaper (static binary)
