name: build

# Publishes ghcr.io/kubedoll-heavy-industries/terraria-tshock with:
#   - keyless cosign signature (OIDC, no key management)
#   - SLSA build provenance attestation (via the official actions/attest-build-provenance)
#   - Trivy CVE gate (HIGH/CRITICAL fails the build; emergency override via workflow_dispatch input)
#
# Why two jobs?
#   `build` produces the image + digest. `provenance` lives in a separate job that
#   the attestation action requires for SLSA's "build came from a different identity
#   than the one that signs" property. Keeping the digest as a job output avoids
#   re-resolving by tag (which could race with a concurrent push).

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    # Nightly base-image refresh so CVE patches in debian-slim / dotnet runtime
    # land in our published image without a human in the loop.
    - cron: '17 5 * * *'
  workflow_dispatch:
    inputs:
      allow_cve:
        description: 'Bypass Trivy HIGH/CRITICAL gate (emergency builds only)'
        type: boolean
        default: false

concurrency:
  # Don't pile up nightly + push builds on the same ref.
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # kubedoll-heavy-industries/terraria-tshock

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write          # push to ghcr.io
      id-token: write          # OIDC for cosign + SLSA
      attestations: write      # SLSA attestation upload
    outputs:
      image: ${{ steps.image.outputs.ref }}
      digest: ${{ steps.build.outputs.digest }}
      tshock_version: ${{ steps.meta_extract.outputs.tshock_version }}
    steps:
      - uses: actions/checkout@v4

      # Read the TShock version straight out of plugins.lock so the workflow
      # never disagrees with what the Dockerfile actually builds. plugins.lock
      # is YAML, but the value lives on one predictable line — grep is fine
      # and avoids dragging in a yaml parser action.
      - id: meta_extract
        name: Extract TShock version from plugins.lock
        run: |
          set -euo pipefail
          v=$(awk '/^tshock:/{f=1;next} f && /^  version:/{print $2; exit}' plugins.lock)
          if [ -z "$v" ]; then echo "could not parse tshock.version from plugins.lock" >&2; exit 1; fi
          echo "tshock_version=$v" >> "$GITHUB_OUTPUT"
          echo "TShock version: $v"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy:
      #   - On tag push (v*):           :<tshock-version>, :<tshock-version>-<run>, :<git-tag>
      #   - On main push:               :<tshock-version>, :<tshock-version>-<run>, :latest, :main-<sha>
      #   - On scheduled rebuild:       :<tshock-version>, :<tshock-version>-<run>  (no :latest — keeps :latest tied to deliberate pushes)
      #   - On workflow_dispatch:       :<tshock-version>, :<tshock-version>-<run>, :dispatch-<run>
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.meta_extract.outputs.tshock_version }}
            type=raw,value=${{ steps.meta_extract.outputs.tshock_version }}-${{ github.run_number }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=main-${{ github.sha }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=dispatch-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache survives across runs and is partition-keyed by ref; the
          # scope keeps nightly + branch caches from clobbering each other.
          cache-from: type=gha,scope=build-${{ github.ref_name }}
          cache-to: type=gha,scope=build-${{ github.ref_name }},mode=max
          provenance: true
          sbom: true

      - id: image
        name: Surface immutable image ref
        run: |
          ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Pushed: $ref"

      # Trivy CVE gate. We scan the published image by digest (not by tag) so
      # there's zero ambiguity about which bits were scanned.
      - id: trivy
        name: Trivy CVE scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: table
          exit-code: ${{ inputs.allow_cve && '0' || '1' }}
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          # vuln only — the misconfig scanner is for IaC, not container images.
          scanners: vuln
        # Emergency: workflow_dispatch with allow_cve=true to publish despite findings.
        # The published image still gets signed + attested; the override is
        # recorded in the workflow run's inputs.

      # Boot smoke-test. The image is published before we get here (build-push
      # runs first), but cosign/SLSA below only attest if THIS step succeeds.
      # An unverified image is on ghcr but won't carry our signature, which is
      # the correct fail-loud signal — pulumi pins will use signed digests.
      #
      # Two variants run in sequence:
      #   (1) baseline: bare docker run, just confirm the apphost gets to
      #       TCP 7777 listen (the smallest "actually works" assertion).
      #   (2) hardened: same securityContext we'll use in K8s — non-root uid
      #       1000, read-only root filesystem, /tmp tmpfs, drop ALL caps.
      #       Catches K8s-runtime-only issues that bare docker run misses.
      # Either failure fails the job. Total budget ~120s for a clean boot.
      # NOTE: no `--rm` on the docker run. If the container crashes early we
      # need `docker logs` to fetch the crash output AFTER the container has
      # exited — `--rm` would have wiped it before we can read.
      # Smoke-test passes if TShock prints its "now running" banner. We do NOT
      # wait for TCP 7777 — that requires a world file (auto-created from
      # config + worldname args), which is operator-state-dependent. The
      # banner is the smallest "image actually executes the apphost past
      # ModFramework + OTAPI + TShockAPI init" assertion.
      - name: Smoke test (baseline)
        env:
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -eo pipefail
          NAME=tshock-smoke-baseline
          # The container runs as uid 1000 and needs to write into the volume.
          # $RUNNER_TEMP belongs to the GHA runner user (uid 1001 typically),
          # so a fresh subdir there isn't writable by uid 1000 by default.
          mkdir -p "$RUNNER_TEMP/serverdata-baseline"
          chmod 0777 "$RUNNER_TEMP/serverdata-baseline"
          docker run -d --name "$NAME" \
              -v "$RUNNER_TEMP/serverdata-baseline:/serverdata/serverfiles" \
              --user 1000:1000 \
              "$IMAGE" -ignoreversion
          ready=0
          for i in $(seq 1 90); do
              if docker logs "$NAME" 2>&1 | grep -q "TShock .* now running"; then
                  echo "::notice::TShock banner detected at t=${i}s (baseline)"
                  ready=1
                  break
              fi
              if [ "$(docker inspect "$NAME" --format '{{.State.Running}}')" != "true" ]; then
                  ec=$(docker inspect "$NAME" --format '{{.State.ExitCode}}')
                  echo "::error::container exited (ExitCode=$ec) before reaching ready (baseline)"
                  docker logs "$NAME" 2>&1 | tail -120
                  docker rm -f "$NAME" >/dev/null
                  exit 1
              fi
              sleep 1
          done
          if [ "$ready" != "1" ]; then
              echo "::error::TShock failed to print 'now running' banner within 90s (baseline)"
              docker logs "$NAME" 2>&1 | tail -120
              docker rm -f "$NAME" >/dev/null
              exit 1
          fi
          docker rm -f "$NAME" >/dev/null
          # Surface the TShock-generated config.json as an artifact. The SDK
          # consumes this as the pinned default (defaults/config-6.1.0.json)
          # for preview-time config rendering. Permission-fix via a privileged
          # alpine container because the file is owned by in-container uid 1000.
          if [ -s "$RUNNER_TEMP/serverdata-baseline/tshock/config.json" ]; then
              docker run --rm -v "$RUNNER_TEMP/serverdata-baseline:/d" alpine:3 \
                  sh -c 'cp /d/tshock/config.json /d/config.json.out && chmod 0644 /d/config.json.out'
              cp "$RUNNER_TEMP/serverdata-baseline/config.json.out" "$RUNNER_TEMP/tshock-config-${{ steps.meta_extract.outputs.tshock_version }}.json"
          fi
          # Files inside the volume were created by the in-container uid 1000;
          # the runner can't unlink them directly. Use a privileged docker run
          # to clean up. Failure here is non-fatal.
          docker run --rm -v "$RUNNER_TEMP/serverdata-baseline:/d" alpine:3 rm -rf /d || true

      - name: Upload TShock-generated config.json artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tshock-config-${{ steps.meta_extract.outputs.tshock_version }}
          path: ${{ runner.temp }}/tshock-config-${{ steps.meta_extract.outputs.tshock_version }}.json
          if-no-files-found: warn
          retention-days: 90

      - name: Smoke test (hardened — matches K8s podSpec)
        env:
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -eo pipefail
          NAME=tshock-smoke-hardened
          mkdir -p "$RUNNER_TEMP/serverdata-hardened"
          chmod 0777 "$RUNNER_TEMP/serverdata-hardened"
          # tmpfs for /tmp because DOTNET_BUNDLE_EXTRACT_BASE_DIR=/tmp and the
          # read-only root would otherwise refuse the bundle extract.
          docker run -d --name "$NAME" \
              -v "$RUNNER_TEMP/serverdata-hardened:/serverdata/serverfiles" \
              --user 1000:1000 \
              --read-only \
              --tmpfs /tmp:rw,exec,size=256m \
              --cap-drop ALL \
              --security-opt no-new-privileges \
              "$IMAGE" -ignoreversion
          ready=0
          for i in $(seq 1 90); do
              if docker logs "$NAME" 2>&1 | grep -q "TShock .* now running"; then
                  echo "::notice::TShock banner detected at t=${i}s (hardened)"
                  ready=1
                  break
              fi
              if [ "$(docker inspect "$NAME" --format '{{.State.Running}}')" != "true" ]; then
                  ec=$(docker inspect "$NAME" --format '{{.State.ExitCode}}')
                  echo "::error::container exited (ExitCode=$ec) before reaching ready (hardened)"
                  docker logs "$NAME" 2>&1 | tail -120
                  docker rm -f "$NAME" >/dev/null
                  exit 1
              fi
              sleep 1
          done
          if [ "$ready" != "1" ]; then
              echo "::error::TShock failed to print 'now running' banner within 90s (hardened)"
              docker logs "$NAME" 2>&1 | tail -120
              docker rm -f "$NAME" >/dev/null
              exit 1
          fi
          docker rm -f "$NAME" >/dev/null
          docker run --rm -v "$RUNNER_TEMP/serverdata-hardened:/d" alpine:3 rm -rf /d || true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Cosign keyless sign
        env:
          IMAGE: ${{ steps.image.outputs.ref }}
        run: cosign sign --yes "$IMAGE"

      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "## terraria-tshock build"
            echo ""
            echo "- **Image:** \`${{ steps.image.outputs.ref }}\`"
            echo "- **TShock version:** ${{ steps.meta_extract.outputs.tshock_version }}"
            echo "- **Tags:** "
            echo '```'
            echo '${{ steps.meta.outputs.tags }}'
            echo '```'
            echo "- **Trivy:** ${{ inputs.allow_cve && 'OVERRIDDEN (allow_cve=true)' || 'passed HIGH/CRITICAL gate' }}"
            echo "- **Cosign:** signed (keyless OIDC)"
            echo "- **Provenance:** attested via actions/attest-build-provenance"
            echo ""
            echo "### Verify locally"
            echo '```sh'
            echo "cosign verify \\"
            echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.*' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  ${{ steps.image.outputs.ref }}"
            echo ""
            echo "gh attestation verify oci://${{ steps.image.outputs.ref }} \\"
            echo "  --owner ${{ github.repository_owner }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
